services:
  stremio-moviebox:
    # 1. Update this to your own GitHub Package path (use lowercase for your username)
    image: ghcr.io/shaikhnedab/stremio-moviebox:latest
    container_name: stremio-moviebox
    restart: unless-stopped
    
    # 2. We change 'ports' to 'expose' because your reverse proxy will handle external traffic.
    # This keeps the port hidden from the public internet except through your proxy.
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
      
    environment:
      - PORT=${PORT:-8000}
      - HOST=${HOST:-0.0.0.0}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-15}
      - MAX_STREAMS=${MAX_STREAMS:-10}
      - ENABLE_CACHE=${ENABLE_CACHE:-true}
      - ENABLE_VALIDATION=${ENABLE_VALIDATION:-true}
      - ENABLE_LOGGING=${ENABLE_LOGGING:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/configure/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s